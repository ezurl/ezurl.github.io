065\u005b\u0053\u005e\u0037\u0042\u004b\u0028\u004f\u006b\u0045\u003e\u0056\u0049\u0045\u004f\u0070\u007c\u0047\u0075\u004c\u0055\u0047\u0058\u003c\u0050\u003b\u0053\u0029\u007d\u007e\u0053\u0039\u0045\u0040\u0074\u0037\u003d\u004b\u0058\u0038\u0041\u003e\u0061\u0060\u0056\u002a\u0077\u005e\u0028\u004a\u006c\u0050\u007b\u005d\u006b\u0067\u0065\u0024\u0030\u0049\u0052\u006f\u006b\u0023\u0072\u004f\u003b\u002e\u003b\u0056\u0057\u0038\u007c\u0059\u003e\u0074\u0056\u005a\u004f\u003c\u0072\u0044\u0035\u0032\u0069\u0053\u0048\u005f\u006d\u0058\u0035\u0063\u0054\u006d\u0043\u0049\u0057\u0078\u0050\u005d\u0051\u0071\u0071\u0026\u0034\u0029\u003b\u0071\u003a\u006f\u0063\u003c\u0072\u0058\u005a\u0032\u0069\u0035\u0067\u0075\u0023\u005a\u0021\u0023\u0047\u0032\u0062\u005b\u003c\u0050\u0040\u002a\u0069\u0040\u0064\u0048\u0034\u0029\u003b\u006b\u0058\u0042\u0072\u0078\u0063\u0069\u0076\u0040\u0055\u0039\u006e\u0062\u007c\u0026\u0021\u002e\u004a\u005a\u0072\u005a\u007c\u0024\u006e\u0063\u0073\u004b\u0028\u0048\u0038\u003b\u003e\u0058\u006d\u005a\u004f\u003f\u0079\u004b\u0040\u0044\u0069\u0037\u0034\u0065\u0063\u0061\u005b\u0061\u003a\u0039\u006d\u004e\u006f\u0044\u0066\u0062\u0052\u0056\u0024\u0056\u0048\u0031\u0025\u0030\u0030\u0060\u0042\u002f\u003f\u005e\u0069\u0040\u003b\u0038\u0057\u004a\u0023\u004c\u0036\u003f\u0074\u0072\u0043\u0044\u0028\u0060\u005e\u0046\u0076\u007e\u0054\u006a\u0033\u0076\u0033\u006d\u004e\u0069\u0048\u003b\u0045\u006c\u0024\u0051\u0055\u002e\u0054\u007d\u006d\u0078\u0023\u0054\u0067\u0066\u0062\u0046\u0060\u007b\u002a\u0032\u0042\u004b\u0028\u0048\u0038\u007d\u0038\u007a\u0049\u0066\u0062\u0024\u006f\u006e\u002a\u0032\u0042\u0040\u0028\u006d\u006c\u0063\u003b\u0065\u0058\u0042\u0072\u0033\u006d\u007e\u0035\u0022\u0064\u0025\u006d\u0024\u0034\u006a\u0021\u003f\u0074\u005a\u0048\u0069\u003d\u006c\u0024\u0044\u0069\u006d\u0050\u0049\u006a\u0074\u004c\u0031\u0025\u0076\u0056\u0040\u005e\u006e\u005a\u004a\u0070\u0039\u004e\u0076\u0023\u0072\u0035\u0035\u0049\u0050\u007c\u0034\u0033\u006c\u0041\u0068\u0070\u002b\u0070\u0047\u006c\u0024\u005b\u0053\u0026\u0060\u0042\u0041\u006f\u007e\u0035\u0066\u0069\u0024\u0074\u0053\u005b\u003a\u0060\u003a\u0065\u007c\u0056\u0023\u006f\u005e\u0050\u0069\u0054\u004c\u0021\u0059\u0023\u0039\u0035\u006e\u0056\u005d\u0062\u0032\u006f\u003b\u0044\u007d\u0069\u007a\u007e\u0049\u0048\u0075\u0022\u005e\u0057\u007e\u0043\u0029\u007b\u0024\u005a\u0022\u0064\u007e\u003b\u0024\u0034\u004a\u0021\u0039\u002e\u005b\u0062\u0055\u007c\u0034\u0040\u0063\u0073\u007d\u0055\u005a\u002a\u003b\u0053\u007e\u0057\u007e\u0043\u004f\u003f\u004e\u005e\u0078\u003b\u003c\u0034\u0038\u007c\u004a\u0038\u0058\u0024\u0060\u0042\u007d\u0079\u0046\u005e\u0046\u0076\u0038\u0057\u0037\u0035\u0063\u003b\u0032\u0054\u0067\u006c\u0061\u0030\u0048\u0024\u002f\u003b\u0052\u0068\u0048\u0034\u003b\u0038\u0023\u0026\u0037\u0042\u0063\u0040\u0039\u0035\u0039\u0075\u002e\u0047\u0034\u0033\u0023\u0021\u007d\u0049\u0044\u0046\u0023\u006f\u0042\u007d\u0053\u007e\u006a\u004b\u0042\u0034\u0072\u0075\u0048\u0058\u0042\u0072\u006d\u0029\u0056\u0051\u006a\u0075\u007e\u004b\u0054\u006b\u0032\u0069\u0071\u003a\u004c\u006c\u0037\u0072\u0052\u0063\u0037\u0069\u0075\u0031\u004f\u002b\u0066\u002b\u006c\u0056\u0024\u0062\u0022\u0033\u0044\u0066\u0073\u0064\u0054\u0057\u0057\u0067\u0046\u0031\u004c\u0043\u0050\u007c\u0059\u0036\u002e\u0041\u0068\u0070\u0024\u0074\u0053\u005b\u003a\u0060\u003a\u0065\u007c\u0056\u0023\u006f\u005e\u0050\u0069\u0054\u0063\u0028\u0054\u0023\u0040\u0055\u002c\u0062\u004c\u0062\u0028\u0062\u0075\u002a\u0063\u0073\u0049\u0042\u0058\u0034\u0033\u004c\u0032\u004a\u0054\u006f\u003c\u0072\u0045\u002a\u0070\u0055\u0040\u0050\u0056\u0048\u0068\u0021\u0075\u0056\u005d\u0062\u0032\u006f\u003b\u0044\u0028\u0064\u002a\u0031\u007d\u006d\u0029\u003b\u0042\u0058\u0042\u0072\u003e\u004d\u002a\u0069\u0044\u0069\u0070\u0054\u005b\u006b\u0062\u002b\u0021\u004e\u0040\u0079\u006e\u003a\u004a\u0040\u0066\u0069\u006b\u002b\u0035\u0048\u0045\
